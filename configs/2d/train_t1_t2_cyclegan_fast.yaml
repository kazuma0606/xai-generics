name: t1_t2_cyclegan_2d_fast

experiment:
  family: image_translation
  baseline: cycle_gan
  notebook_reference: ipynb/CycleGAN_batch1_RGB_T1_T2_.ipynb
  run_name_legacy: CE2RGB_T1_T2_FLIR_batch_1_cyclegan
  intended_clean_name: t1_t2_cyclegan_2d_fast
  legacy_checkpoint_reference: checkpoint/T1W2T2W_batch_1_cyclegan
  legacy_script_reference:
    - scripts/clasical/train.py
    - scripts/clasical/test.py

dataset_ref: configs/2d/dataset_t1_t2_fast.yaml

model:
  type: cycle_gan
  netG: resnet_9blocks
  n_blocks: 3
  netD: basic
  input_nc: 3
  output_nc: 3
  ngf: 32
  ndf: 32
  pool_size: 25

training:
  batch_size: 1
  direction: AtoB
  preprocess: resize_and_crop
  n_epochs: 2
  n_epochs_decay: 0
  epoch_count_start: 1
  continue_train: false
  first_reproduction_policy:
    keep_legacy_crop_baseline: false
    load_size: 64
    crop_size: 64

resume:
  supported: true
  continue_train_flag: true
  epoch_count_start_example: 10
  notebook_reference_example:
    command_fragment: "--continue_train --epoch_count 10"
  observed_checkpoint_resume_state:
    epoch: latest
    epoch_count: 199
    continue_train: true

logging:
  display_freq: 50
  print_freq: 10
  save_latest_freq: 50
  save_epoch_freq: 1
  update_html_freq: 100

runtime:
  device: cuda
  mixed_precision: false
  benchmark_first: true
  benchmark_subset_cases: 4
  benchmark_max_steps: 25
  legacy_gpu_ids: "0"

inference_reference:
  observed_test_direction: BtoA
  observed_test_epoch: 200
  observed_test_preprocess: resize_and_crop
  observed_test_load_size: 64
  observed_test_crop_size: 64

checkpoint_audit:
  generator_weights_present: false
  discriminator_weights_present: true
  suitable_for_direct_inference: false
  suitable_for_full_resume: false

artifacts:
  run_root: outputs/runs/t1_t2_cyclegan_2d_fast
  checkpoint_root: outputs/runs/t1_t2_cyclegan_2d_fast/checkpoints
  sample_root: outputs/runs/t1_t2_cyclegan_2d_fast/samples
  log_root: outputs/runs/t1_t2_cyclegan_2d_fast/logs
